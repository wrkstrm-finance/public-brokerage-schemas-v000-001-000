name: "🚦 Tests | PublicBrokerageSchemas"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  swift-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache SPM dependencies
        id: cache-spm
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-public-brokerage-schemas-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-public-brokerage-schemas-
      - name: Swift Test
        run: swift test --parallel
